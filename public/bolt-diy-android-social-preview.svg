<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <!--
    bolt.diy Android social preview image
    Android port/adaptation © 2026 Mert Gövse
    Based on bolt.diy by StackBlitz Labs and contributors.
  -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12131C"/>
      <stop offset="50%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#08080A"/>
    </linearGradient>

    <!-- Bolt Glow / Lightning Gradient -->
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1389fd"/>
      <stop offset="100%" stop-color="#0a6fd6"/>
    </linearGradient>

    <!-- Android Green Gradient -->
    <linearGradient id="androidGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#2bb86a"/>
    </linearGradient>
    
    <!-- Shadow filter for 3D effect -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1389fd" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle decorative grid -->
  <path d="M 0,100 L 1200,100 M 0,200 L 1200,200 M 0,300 L 1200,300 M 0,400 L 1200,400 M 0,500 L 1200,500" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <path d="M 200,0 L 200,630 M 400,0 L 400,630 M 600,0 L 600,630 M 800,0 L 800,630 M 1000,0 L 1000,630" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- Left Side: Typography -->
  <g transform="translate(100, 180)" filter="url(#dropShadow)">
    <!-- Main Title -->
    <text x="0" y="80" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">
      bolt.diy <tspan fill="url(#androidGrad)">Android</tspan>
    </text>

    <!-- Subtitle / Tagline -->
    <text x="0" y="160" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#a0aec0" letter-spacing="-0.5">
      Android-first mobile port/adaptation of bolt.diy
    </text>

    <!-- Description -->
    <text x="0" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#718096" width="600">
      Build web applications on the go. Complete with in-memory files store,
    </text>
    <text x="0" y="250" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#718096">
      IndexedDB persistence, and support for remote execution sandboxes.
    </text>
  </g>

  <!-- Right Side: Clean Bolt & Android Badge Logo Artwork -->
  <g transform="translate(780, 150)" filter="url(#dropShadow)">
    <!-- Background Circle Frame -->
    <circle cx="160" cy="160" r="160" fill="#1e1e2f" fill-opacity="0.5" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Outer Android Green Ring -->
    <circle cx="160" cy="160" r="140" stroke="url(#androidGrad)" stroke-width="4" stroke-opacity="0.3"/>

    <!-- Large Bolt Lightning Graphic -->
    <!-- Scaled Bolt path (normally 256 size, scaled to fit cx/cy) -->
    <path d="M 160,50 L 100,180 H 140 L 120,270 L 220,150 H 170 Z" 
          fill="url(#boltGrad)" 
          stroke="#0a6fd6" 
          stroke-width="3" 
          stroke-linejoin="round"
          transform="scale(1.1) translate(-15, -15)"/>

    <!-- Mini Android Robot ears sticking out from the circle -->
    <path d="M 140,20 L 120,5" stroke="#3ddc84" stroke-width="6" stroke-linecap="round"/>
    <path d="M 180,20 L 200,5" stroke="#3ddc84" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Footer Branding and Attribution -->
  <rect x="0" y="570" width="1200" height="60" fill="#08080a" fill-opacity="0.8"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#1a1a24" stroke-width="1"/>
  
  <text x="100" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#718096">
    Android Port &amp; Adaptation © 2026 Mert Gövse
  </text>
  
  <text x="1100" y="607" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#4a5568" text-anchor="end">
    Based on bolt.diy by StackBlitz Labs &amp; contributors | Licensed under MIT
  </text>
</svg>
