<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    bolt.diy Android app icon
    Android port/adaptation © 2026 Mert Gövse
    Based on bolt.diy by StackBlitz Labs and contributors.
    Distinct design — bolt-inspired with Android badge.
  -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1389fd"/>
      <stop offset="1" stop-color="#0a6fd6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Bolt icon (centered, large) -->
  <path d="M256 72 L160 280 H222 L188 440 L344 224 H268 Z"
        fill="url(#boltGrad)"
        stroke="#0a6fd6"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Android badge (bottom-right) -->
  <rect x="320" y="380" width="130" height="44" rx="10" fill="#3ddc84"/>
  <text x="385" y="408" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" fill="#0c0c0c" text-anchor="middle">ANDROID</text>

  <!-- Robot antenna accents -->
  <line x1="316" y1="372" x2="324" y2="362" stroke="#3ddc84" stroke-width="4" stroke-linecap="round"/>
  <line x1="340" y1="372" x2="348" y2="362" stroke="#3ddc84" stroke-width="4" stroke-linecap="round"/>
</svg>
