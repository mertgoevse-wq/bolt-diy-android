<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!--
    bolt.diy Android logo
    Android port/adaptation © 2026 Mert Gövse
    Based on bolt.diy by StackBlitz Labs and contributors.
    Original bolt.diy logos remain property of their respective owners.
    This is a distinct design inspired by the bolt/lightning concept.
  -->
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1389fd"/>
      <stop offset="1" stop-color="#0a6fd6"/>
    </linearGradient>
  </defs>

  <!-- Bolt icon -->
  <path d="M20 6 L8 34 H18 L14 58 L32 28 H22 Z" fill="url(#boltGrad)" stroke="#0a6fd6" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- "bolt.diy" text -->
  <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1a1a1a">bolt.diy</text>

  <!-- Android badge -->
  <rect x="44" y="38" width="72" height="18" rx="4" fill="#3ddc84"/>
  <text x="80" y="51" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0c0c0c" text-anchor="middle">ANDROID</text>

  <!-- Small robot antenna hint -->
  <line x1="108" y1="36" x2="112" y2="32" stroke="#3ddc84" stroke-width="2" stroke-linecap="round"/>
  <line x1="114" y1="36" x2="118" y2="32" stroke="#3ddc84" stroke-width="2" stroke-linecap="round"/>
</svg>
